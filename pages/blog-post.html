<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مقال — أدوات التاجر</title>
<meta name="description" content="مقال من مدونة أدوات التاجر — نصائح ومعلومات عملية للتاجر السعودي.">
<meta property="og:type" content="article">
<meta property="og:locale" content="ar_SA">
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
<script>(function(){var t=localStorage.getItem('tajer-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/styles.css">
<style>
  .post-page { max-width: 820px; margin: 0 auto; padding: 3rem 2rem 6rem; }

  .post-breadcrumb { display: flex; align-items: center; gap: 0.5rem; font-size: 0.82rem; color: var(--ink-dim); margin-bottom: 2.5rem; flex-wrap: wrap; }
  .post-breadcrumb a { color: var(--ink-dim); text-decoration: none; }
  .post-breadcrumb a:hover { color: var(--accent); }
  .post-breadcrumb span { color: var(--line-strong); }

  .post-category { display: inline-block; background: var(--accent-soft); color: var(--accent); font-size: 0.78rem; font-weight: 700; padding: 0.3rem 0.8rem; border-radius: 99px; margin-bottom: 1rem; }

  .post-title { font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 800; line-height: 1.35; margin-bottom: 1.5rem; color: var(--ink); }

  .post-meta { display: flex; align-items: center; gap: 1.5rem; margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--line); flex-wrap: wrap; }
  .post-meta-author { display: flex; align-items: center; gap: 0.6rem; }
  .post-meta-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-2), var(--accent)); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 0.9rem; flex-shrink: 0; }
  .post-meta-name { font-size: 0.88rem; font-weight: 600; }
  .post-meta-stat { display: flex; align-items: center; gap: 0.35rem; font-size: 0.82rem; color: var(--ink-dim); }

  .post-cover { width: 100%; height: 380px; object-fit: cover; border-radius: var(--radius-lg); margin-bottom: 2.5rem; background: var(--bg-alt); display: flex; align-items: center; justify-content: center; }
  .post-cover img { width: 100%; height: 100%; object-fit: cover; border-radius: var(--radius-lg); }
  .post-cover-placeholder { font-size: 5rem; opacity: 0.3; border: 1px solid var(--line); border-radius: var(--radius-lg); width: 100%; height: 380px; display: flex; align-items: center; justify-content: center; background: var(--bg-alt); }

  .post-content { color: var(--ink); line-height: 1.9; font-size: 1.05rem; }
  .post-content h1, .post-content h2, .post-content h3 { color: var(--ink); font-weight: 700; margin: 2rem 0 0.75rem; line-height: 1.4; }
  .post-content h2 { font-size: 1.4rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--line); }
  .post-content h3 { font-size: 1.15rem; }
  .post-content p { margin-bottom: 1.25rem; }
  .post-content ul, .post-content ol { padding-right: 1.5rem; margin-bottom: 1.25rem; }
  .post-content li { margin-bottom: 0.4rem; }
  .post-content a { color: var(--accent); text-decoration: underline; }
  .post-content strong { color: var(--ink); font-weight: 700; }
  .post-content blockquote { border-right: 3px solid var(--accent); padding: 0.75rem 1rem; background: var(--accent-soft); border-radius: 0 var(--radius-md) var(--radius-md) 0; margin: 1.5rem 0; font-style: italic; color: var(--ink-dim); }
  .post-content code { background: var(--bg-alt); padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.9em; font-family: monospace; }
  .post-content pre { background: var(--bg-alt); padding: 1rem 1.2rem; border-radius: var(--radius-md); overflow-x: auto; margin-bottom: 1.25rem; }
  .post-content img { max-width: 100%; border-radius: var(--radius-md); margin: 1rem 0; }

  .post-tags { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 2.5rem; padding-top: 1.5rem; border-top: 1px solid var(--line); }
  .post-tag { padding: 0.3rem 0.8rem; border-radius: 99px; border: 1px solid var(--line-strong); font-size: 0.78rem; color: var(--ink-dim); }

  .post-back { text-align: center; margin-top: 3rem; }

  .post-skeleton { animation: pulse 1.5s ease-in-out infinite; }
  .skeleton-line { height: 1em; background: var(--bg-alt); border-radius: 4px; margin-bottom: 0.75rem; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a class="nav-logo" href="../index.html">
      <svg width="22" height="30" viewBox="0 0 100 140" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="50,4 93,30 93,110 50,136 7,110 7,30" fill="#6366f1"/>
        <polygon class="logo-bg" points="7,30 50,4 50,70 7,70"/>
        <polygon class="logo-bg" points="50,70 93,70 93,110 50,136"/>
      </svg>
      <span>أدوات التاجر</span>
    </a>
    <div class="nav-links">
      <a href="../index.html">الرئيسية</a>
      <a href="works.html">أعمالنا</a>
      <a href="blog.html">المدونة</a>
    </div>
    <div class="nav-cta">
      <a class="btn-primary" href="login.html">ابدأ مجاناً</a>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="تبديل الوضع">
      <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
    </button>
  </div>
</nav>

<main class="post-page" id="postPage">
  <div class="post-skeleton">
    <div class="skeleton-line" style="width:30%;height:0.8rem;margin-bottom:2rem;"></div>
    <div class="skeleton-line" style="width:80%;height:2rem;"></div>
    <div class="skeleton-line" style="width:60%;height:2rem;margin-bottom:2rem;"></div>
    <div style="height:380px;background:var(--bg-alt);border-radius:var(--radius-lg);margin-bottom:2rem;"></div>
    <div class="skeleton-line"></div>
    <div class="skeleton-line" style="width:90%;"></div>
    <div class="skeleton-line" style="width:85%;"></div>
    <div class="skeleton-line" style="width:70%;"></div>
  </div>
</main>

<script src="../assets/api.js"></script>
<script>
const slug = new URLSearchParams(location.search).get('slug');

async function loadPost() {
  if (!slug) {
    document.getElementById('postPage').innerHTML = '<div style="text-align:center;padding:5rem;color:var(--ink-dim);">المقال غير موجود</div>';
    return;
  }

  try {
    const post = await api.getBlogPost(slug);
    document.title = `${post.title} — أدوات التاجر`;

    const coverHtml = post.cover_image
      ? `<div class="post-cover"><img src="${post.cover_image}" alt="${post.title}" loading="lazy" /></div>`
      : `<div class="post-cover-placeholder"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div>`;

    const tagsHtml = (post.tags || []).length
      ? `<div class="post-tags">${post.tags.map(t => `<span class="post-tag">#${t}</span>`).join('')}</div>`
      : '';

    const date = post.created_at
      ? new Date(post.created_at).toLocaleDateString('ar-SA', { year: 'numeric', month: 'long', day: 'numeric' })
      : '';

    document.getElementById('postPage').innerHTML = `
      <div class="post-breadcrumb">
        <a href="../index.html">الرئيسية</a>
        <span>›</span>
        <a href="blog.html">المدونة</a>
        <span>›</span>
        <span style="color:var(--ink);">${post.title}</span>
      </div>

      <div class="post-category">${post.category || 'عام'}</div>
      <h1 class="post-title">${post.title}</h1>

      <div class="post-meta">
        <div class="post-meta-author">
          <div class="post-meta-avatar">${(post.author_name || 'أ').charAt(0)}</div>
          <div class="post-meta-name">${post.author_name || 'فريق أدوات التاجر'}</div>
        </div>
        ${date ? `<div class="post-meta-stat">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          ${date}
        </div>` : ''}
        <div class="post-meta-stat">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          ${post.read_time || 3} دقائق قراءة
        </div>
        <div class="post-meta-stat">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          ${post.views || 0} مشاهدة
        </div>
      </div>

      ${coverHtml}

      <div class="post-content">${post.content || ''}</div>

      ${tagsHtml}

      <div class="post-back">
        <a href="blog.html" class="btn-secondary" style="padding:0.75rem 2rem;display:inline-flex;align-items:center;gap:0.5rem;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          العودة للمدونة
        </a>
      </div>`;
  } catch {
    document.getElementById('postPage').innerHTML = `
      <div style="text-align:center;padding:5rem;">
        <div style="margin-bottom:1rem;opacity:0.3;"><svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/><line x1="8" y1="17" x2="4" y2="17"/></svg></div>
        <h2 style="color:var(--ink);">المقال غير موجود</h2>
        <p style="color:var(--ink-dim);margin:0.75rem 0 2rem;">ربما تم حذف هذا المقال أو الرابط غير صحيح.</p>
        <a href="blog.html" class="btn-primary" style="padding:0.75rem 2rem;">العودة للمدونة</a>
      </div>`;
  }
}

loadPost();
</script>
</body>
</html>
