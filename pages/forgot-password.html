<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نسيت كلمة المرور — أدوات التاجر</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
<script>(function(){var t=localStorage.getItem('tajer-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/styles.css?v=13">
<link rel="stylesheet" href="../assets/responsive.css?v=1">
<style>
  .auth-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    position: relative;
  }
  .auth-card {
    width: 100%;
    max-width: 420px;
    background: var(--bg-alt);
    border: 1px solid var(--line-strong);
    border-radius: var(--radius-lg);
    padding: 2.5rem;
    position: relative;
    overflow: hidden;
  }
  .auth-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent-2), var(--accent), var(--accent-3));
  }
  .auth-logo { text-align: center; margin-bottom: 2rem; }
  .auth-logo svg { width: 36px; height: 50px; }
  .auth-title { font-size: 1.4rem; font-weight: 700; text-align: center; margin-bottom: 0.5rem; }
  .auth-subtitle { color: var(--ink-dim); text-align: center; font-size: 0.9rem; margin-bottom: 2rem; line-height: 1.6; }
  .auth-form .form-group { margin-bottom: 1.2rem; }
  .auth-form label { display: block; font-size: 0.83rem; color: var(--ink-dim); margin-bottom: 0.4rem; }
  .auth-form .input { width: 100%; }
  .auth-submit { width: 100%; padding: 0.85rem; font-size: 1rem; margin-top: 0.5rem; }
  .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.87rem; color: var(--ink-dim); }
  .auth-footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
  .auth-footer a:hover { text-decoration: underline; }
  .msg-box { padding: 0.85rem 1rem; border-radius: var(--radius-md); font-size: 0.88rem; margin-bottom: 1rem; display: none; }
  .msg-box.success { background: rgba(34,197,94,0.12); color: #22c55e; border: 1px solid rgba(34,197,94,0.25); }
  .msg-box.error   { background: rgba(239,68,68,0.12); color: #ef4444; border: 1px solid rgba(239,68,68,0.25); }
</style>
</head>
<body>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <a href="../index.html">
        <svg viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg">
          <polygon points="50,4 93,30 93,110 50,136 7,110 7,30" fill="#a855f7"/>
          <polygon class="logo-bg" points="7,30 50,4 50,70 7,70"/>
          <polygon class="logo-bg" points="50,70 93,70 93,110 50,136"/>
        </svg>
      </a>
    </div>

    <h1 class="auth-title">نسيت كلمة المرور؟</h1>
    <p class="auth-subtitle">أدخل بريدك الإلكتروني وسنرسل لك رمزاً من 6 أرقام لإعادة التعيين.</p>

    <div class="msg-box" id="msgBox"></div>

    <form class="auth-form" id="forgotForm" onsubmit="handleSubmit(event)">
      <div class="form-group">
        <label for="email">البريد الإلكتروني</label>
        <input type="email" id="email" class="input" placeholder="you@example.com" required autocomplete="email">
      </div>
      <button type="submit" class="btn-primary auth-submit" id="submitBtn">
        إرسال رمز إعادة التعيين
      </button>
    </form>

    <div class="auth-footer">
      <a href="login.html">← العودة لتسجيل الدخول</a>
    </div>
  </div>
</div>

<script src="../assets/api.js?v=46"></script>
<script>
async function handleSubmit(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const btn = document.getElementById('submitBtn');
  const msgBox = document.getElementById('msgBox');

  btn.disabled = true;
  btn.textContent = 'جاري الإرسال...';
  msgBox.style.display = 'none';

  try {
    const data = await api.forgotPassword(email);
    msgBox.className = 'msg-box success';
    msgBox.textContent = (data.message || 'تم الإرسال') + ' — جارٍ تحويلك...';
    msgBox.style.display = 'block';
    const q = 'email=' + encodeURIComponent(email) + (data.devCode ? '&dev=' + data.devCode : '');
    setTimeout(() => { location.href = 'reset-password.html?' + q; }, 1200);
  } catch (err) {
    msgBox.className = 'msg-box error';
    msgBox.textContent = err.message || 'حدث خطأ';
    msgBox.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'إرسال رمز إعادة التعيين';
  }
}
</script>
<script src="../assets/header.js?v=19"></script>
</body>
</html>
