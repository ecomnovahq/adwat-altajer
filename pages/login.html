<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول — أدوات التاجر</title>
<meta name="description" content="سجّل دخولك إلى أدوات التاجر للوصول إلى الأدوات الذكية المجانية وإدارة اشتراكك.">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
<script>(function(){var t=localStorage.getItem('tajer-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/styles.css">
<style>
  .auth-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background: var(--bg);
    position: relative;
  }
  .auth-page::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 70% 20%, rgba(168,85,247,0.18) 0%, transparent 55%),
      radial-gradient(ellipse at 20% 80%, rgba(79,70,229,0.1) 0%, transparent 50%);
    pointer-events: none;
  }
  .auth-card {
    width: 100%;
    max-width: 460px;
    background: var(--bg-alt);
    border: 1px solid var(--line-strong);
    border-radius: var(--radius-lg);
    padding: 3rem;
    position: relative;
    box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px var(--line-strong);
  }
  .auth-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent-2) 0%, var(--accent) 50%, var(--accent-3) 100%);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  }
  .auth-logo {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin-bottom: 2.5rem;
    text-decoration: none;
  }
  .auth-logo svg { width: 36px; height: 50px; }
  .auth-logo-text-ar { font-family: var(--font-arabic); font-weight: 700; color: var(--ink); font-size: 1rem; }
  .auth-logo-text-en { font-size: 0.68rem; color: var(--ink-dim); font-family: var(--font-arabic); font-weight: 300; letter-spacing: 0.14em; text-transform: uppercase; }
  .auth-tabs {
    display: flex;
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 4px;
    margin-bottom: 2rem;
    border: 1px solid var(--line);
  }
  .auth-tab {
    flex: 1;
    padding: 0.65rem;
    text-align: center;
    font-family: var(--font-arabic);
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    border-radius: calc(var(--radius-sm) - 2px);
    transition: all var(--transition);
    color: var(--ink-dim);
    border: none;
    background: none;
  }
  .auth-tab.active {
    background: linear-gradient(135deg, var(--accent-2) 0%, var(--accent) 100%);
    color: #fff;
    box-shadow: 0 2px 12px rgba(168,85,247,0.35);
  }
  .auth-form { display: none; }
  .auth-form.active { display: block; }
  .form-group { margin-bottom: 1.2rem; }
  .form-group label { display: block; font-size: 0.85rem; color: var(--ink-dim); margin-bottom: 0.4rem; font-weight: 500; }
  .auth-submit {
    width: 100%;
    padding: 0.9rem;
    background: linear-gradient(135deg, var(--accent-2) 0%, var(--accent) 100%);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-family: var(--font-arabic);
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all var(--transition);
    margin-top: 0.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    box-shadow: 0 4px 16px rgba(168,85,247,0.3);
  }
  .auth-submit:hover { opacity: 0.92; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(168,85,247,0.4); }
  .auth-submit:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: none; }
  .auth-error {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: #f87171;
    padding: 0.8rem 1rem;
    border-radius: var(--radius-sm);
    font-size: 0.9rem;
    margin-bottom: 1rem;
    display: none;
  }
  .auth-error.visible { display: block; }
  .auth-divider { text-align: center; color: var(--ink-dim); font-size: 0.8rem; margin: 1.5rem 0; }
  .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.35); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
  .spinner.visible { display: block; }
</style>
</head>
<body>

<div class="auth-page">
  <div class="auth-card">
    <a href="../index.html" class="auth-logo">
      <svg viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg">
        <polygon points="50,4 93,30 93,110 50,136 7,110 7,30" fill="#6366f1"/>
        <polygon class="logo-bg" points="7,30 50,4 50,70 7,70"/>
        <polygon class="logo-bg" points="50,70 93,70 93,110 50,136"/>
      </svg>
      <div>
        <div class="auth-logo-text-ar">أدوات التاجر</div>
        <div class="auth-logo-text-en">Tajer Tools</div>
      </div>
    </a>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">تسجيل الدخول</button>
      <button class="auth-tab" onclick="switchTab('register')">حساب جديد</button>
    </div>

    <div id="errorMsg" class="auth-error"></div>

    <!-- Login Form -->
    <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" id="loginEmail" class="input" placeholder="example@email.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" id="loginPassword" class="input" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" class="auth-submit" id="loginBtn">
        <span class="btn-text">دخول</span>
        <div class="spinner" id="loginSpinner"></div>
      </button>
      <div style="text-align:center;margin-top:1rem;">
        <a href="forgot-password.html" style="color:var(--ink-dim);font-size:0.83rem;text-decoration:none;">نسيت كلمة المرور؟</a>
      </div>
    </form>

    <!-- Register Form -->
    <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>الاسم الكامل</label>
        <input type="text" id="regName" class="input" placeholder="محمد العتيبي" required />
      </div>
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" id="regEmail" class="input" placeholder="example@email.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label>كلمة المرور <span style="color:var(--ink-dim);font-size:0.75rem;">(8 أحرف على الأقل)</span></label>
        <input type="password" id="regPassword" class="input" placeholder="••••••••" required minlength="8" autocomplete="new-password" />
      </div>
      <button type="submit" class="auth-submit" id="registerBtn">
        <span class="btn-text">إنشاء حساب</span>
        <div class="spinner" id="registerSpinner"></div>
      </button>
    </form>

    <div class="auth-divider">
      <a href="../index.html" style="color:var(--accent);text-decoration:none;font-size:0.85rem;">← العودة للرئيسية</a>
    </div>
  </div>
</div>

<script src="../assets/api.js"></script>
<script>
  // Redirect if already logged in
  if (auth.isLoggedIn()) {
    window.location.href = auth.isAdmin() ? 'admin.html' : '../index.html';
  }

  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0) === (tab === 'login'));
    });
    document.querySelectorAll('.auth-form').forEach((f) => f.classList.remove('active'));
    document.getElementById(tab + 'Form').classList.add('active');
    showError('');
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.toggle('visible', !!msg);
  }

  function setLoading(btnId, spinnerId, loading) {
    const btn = document.getElementById(btnId);
    const spinner = document.getElementById(spinnerId);
    btn.disabled = loading;
    btn.querySelector('.btn-text').style.display = loading ? 'none' : '';
    spinner.classList.toggle('visible', loading);
  }

  async function handleLogin(e) {
    e.preventDefault();
    showError('');
    setLoading('loginBtn', 'loginSpinner', true);
    try {
      const data = await api.login(
        document.getElementById('loginEmail').value,
        document.getElementById('loginPassword').value
      );
      window.location.href = data.user.is_admin ? 'admin.html' : '../index.html';
    } catch (err) {
      showError(err.message);
      setLoading('loginBtn', 'loginSpinner', false);
    }
  }

  async function handleRegister(e) {
    e.preventDefault();
    showError('');
    setLoading('registerBtn', 'registerSpinner', true);
    try {
      await api.register(
        document.getElementById('regName').value,
        document.getElementById('regEmail').value,
        document.getElementById('regPassword').value
      );
      window.location.href = '../index.html';
    } catch (err) {
      showError(err.message);
      setLoading('registerBtn', 'registerSpinner', false);
    }
  }

  // Theme toggle
  document.addEventListener('DOMContentLoaded', () => {
    const btn = document.getElementById('themeToggle');
    if (btn) btn.addEventListener('click', () => {
      const isLight = document.documentElement.getAttribute('data-theme') === 'light';
      document.documentElement.setAttribute('data-theme', isLight ? 'dark' : 'light');
      localStorage.setItem('tajer-theme', isLight ? 'dark' : 'light');
    });
  });
</script>
</body>
</html>
