<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول — أدوات التاجر</title>
<meta name="description" content="سجّل دخولك إلى أدوات التاجر للوصول إلى الأدوات الذكية المجانية وإدارة اشتراكك.">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
<script>(function(){var t=localStorage.getItem('tajer-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/styles.css?v=13">
<link rel="stylesheet" href="../assets/responsive.css?v=1">
<style>
  .auth-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background: var(--bg);
    position: relative;
  }
  .auth-page::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 70% 20%, rgba(168,85,247,0.18) 0%, transparent 55%),
      radial-gradient(ellipse at 20% 80%, rgba(79,70,229,0.1) 0%, transparent 50%);
    pointer-events: none;
  }
  .auth-card {
    width: 100%;
    max-width: 460px;
    background: var(--bg-alt);
    border: 1px solid var(--line-strong);
    border-radius: var(--radius-lg);
    padding: 3rem;
    position: relative;
    box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px var(--line-strong);
  }
  .auth-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent-2) 0%, var(--accent) 50%, var(--accent-3) 100%);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  }
  .auth-logo {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin-bottom: 2.5rem;
    text-decoration: none;
  }
  .auth-logo svg { width: 36px; height: 50px; }
  .auth-logo-text-ar { font-family: var(--font-arabic); font-weight: 700; color: var(--ink); font-size: 1rem; }
  .auth-logo-text-en { font-size: 0.68rem; color: var(--ink-dim); font-family: var(--font-arabic); font-weight: 300; letter-spacing: 0.14em; text-transform: uppercase; }
  .auth-tabs {
    display: flex;
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 4px;
    margin-bottom: 2rem;
    border: 1px solid var(--line);
  }
  .auth-tab {
    flex: 1;
    padding: 0.65rem;
    text-align: center;
    font-family: var(--font-arabic);
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    border-radius: calc(var(--radius-sm) - 2px);
    transition: all var(--transition);
    color: var(--ink-dim);
    border: none;
    background: none;
  }
  .auth-tab.active {
    background: linear-gradient(135deg, var(--accent-2) 0%, var(--accent) 100%);
    color: #fff;
    box-shadow: 0 2px 12px rgba(168,85,247,0.35);
  }
  .auth-form { display: none; }
  .auth-form.active { display: block; }
  .form-group { margin-bottom: 1.2rem; }
  .form-group label { display: block; font-size: 0.85rem; color: var(--ink-dim); margin-bottom: 0.4rem; font-weight: 500; }
  .auth-submit {
    width: 100%;
    padding: 0.9rem;
    background: linear-gradient(135deg, var(--accent-2) 0%, var(--accent) 100%);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-family: var(--font-arabic);
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all var(--transition);
    margin-top: 0.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    box-shadow: 0 4px 16px rgba(168,85,247,0.3);
  }
  .auth-submit:hover { opacity: 0.92; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(168,85,247,0.4); }
  .auth-submit:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: none; }
  .auth-error {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: #f87171;
    padding: 0.8rem 1rem;
    border-radius: var(--radius-sm);
    font-size: 0.9rem;
    margin-bottom: 1rem;
    display: none;
  }
  .auth-error.visible { display: block; }
  .auth-divider { text-align: center; color: var(--ink-dim); font-size: 0.8rem; margin: 1.5rem 0; }
  .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.35); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
  .spinner.visible { display: block; }
  /* إظهار/إخفاء كلمة المرور */
  .pw-wrap { position: relative; }
  .pw-wrap .input { padding-left: 2.8rem; }
  .pw-eye { position: absolute; left: .6rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--ink-dim); padding: .3rem; display: flex; }
  .pw-eye:hover { color: var(--accent); }
  .pw-eye svg { width: 18px; height: 18px; }
  /* خطوة الكود */
  .code-input { width: 100%; text-align: center; letter-spacing: .8rem; font-size: 1.6rem; font-weight: 800; font-family: monospace; padding: .8rem; }
  .auth-note { background: var(--accent-soft); border: 1px solid var(--line-accent); color: var(--ink); font-size: .82rem; padding: .7rem .9rem; border-radius: var(--radius-sm); margin-bottom: 1rem; line-height: 1.7; }
  .link-btn { background: none; border: none; color: var(--accent); cursor: pointer; font-family: var(--font-arabic); font-size: .85rem; }
</style>
</head>
<body>

<div class="auth-page">
  <div class="auth-card">
    <a href="../index.html" class="auth-logo">
      <svg viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg">
        <polygon points="50,4 93,30 93,110 50,136 7,110 7,30" fill="#6366f1"/>
        <polygon class="logo-bg" points="7,30 50,4 50,70 7,70"/>
        <polygon class="logo-bg" points="50,70 93,70 93,110 50,136"/>
      </svg>
      <div>
        <div class="auth-logo-text-ar">أدوات التاجر</div>
        <div class="auth-logo-text-en">Tajer Tools</div>
      </div>
    </a>

    <div class="auth-tabs" id="authTabs">
      <button class="auth-tab active" onclick="switchTab('login')">تسجيل الدخول</button>
      <button class="auth-tab" onclick="switchTab('register')">حساب جديد</button>
    </div>

    <div id="errorMsg" class="auth-error"></div>

    <!-- Login Form -->
    <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" id="loginEmail" class="input" placeholder="example@email.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <div class="pw-wrap">
          <input type="password" id="loginPassword" class="input" placeholder="••••••••" required autocomplete="current-password" />
          <button type="button" class="pw-eye" onclick="togglePw('loginPassword',this)" aria-label="إظهار كلمة المرور"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
      </div>
      <button type="submit" class="auth-submit" id="loginBtn">
        <span class="btn-text">دخول</span>
        <div class="spinner" id="loginSpinner"></div>
      </button>
      <div style="text-align:center;margin-top:1rem;">
        <a href="forgot-password.html" style="color:var(--ink-dim);font-size:0.83rem;text-decoration:none;">نسيت كلمة المرور؟</a>
      </div>
    </form>

    <!-- Register Form -->
    <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>الاسم الكامل</label>
        <input type="text" id="regName" class="input" placeholder="محمد العتيبي" required />
      </div>
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" id="regEmail" class="input" placeholder="example@email.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label>رقم الجوال</label>
        <input type="tel" id="regPhone" class="input" placeholder="05xxxxxxxx" required inputmode="tel" autocomplete="tel" />
      </div>
      <div class="form-group">
        <label>كلمة المرور <span style="color:var(--ink-dim);font-size:0.75rem;">(8 أحرف على الأقل)</span></label>
        <div class="pw-wrap">
          <input type="password" id="regPassword" class="input" placeholder="••••••••" required minlength="8" autocomplete="new-password" />
          <button type="button" class="pw-eye" onclick="togglePw('regPassword',this)" aria-label="إظهار كلمة المرور"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
      </div>
      <button type="submit" class="auth-submit" id="registerBtn">
        <span class="btn-text">إرسال رمز التفعيل</span>
        <div class="spinner" id="registerSpinner"></div>
      </button>
    </form>

    <!-- Verify Code Form -->
    <form class="auth-form" id="verifyForm" onsubmit="handleVerify(event)">
      <div class="auth-note">أرسلنا رمزاً من 6 أرقام إلى <b id="verifyEmailLabel"></b>. أدخله لتفعيل حسابك.</div>
      <div id="devCodeNote" class="auth-note" style="display:none;"></div>
      <div class="form-group">
        <label>رمز التفعيل</label>
        <input type="text" id="verifyCode" class="input code-input" placeholder="······" required inputmode="numeric" maxlength="6" autocomplete="one-time-code" />
      </div>
      <button type="submit" class="auth-submit" id="verifyBtn">
        <span class="btn-text">تأكيد وتفعيل الحساب</span>
        <div class="spinner" id="verifySpinner"></div>
      </button>
      <div style="text-align:center;margin-top:1rem;display:flex;justify-content:space-between;">
        <button type="button" class="link-btn" onclick="resendCode()">إعادة إرسال الرمز</button>
        <button type="button" class="link-btn" onclick="switchTab('register')">تعديل البيانات</button>
      </div>
    </form>

    <div class="auth-divider">
      <a href="../index.html" style="color:var(--accent);text-decoration:none;font-size:0.85rem;">← العودة للرئيسية</a>
    </div>
  </div>
</div>

<script src="../assets/api.js?v=46"></script>
<script>
  // Redirect if already logged in
  if (auth.isLoggedIn()) {
    window.location.href = auth.isAdmin() ? 'admin.html' : '../index.html';
  }

  function switchTab(tab) {
    document.getElementById('authTabs').style.display = 'flex';
    document.querySelectorAll('.auth-tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0) === (tab === 'login'));
    });
    document.querySelectorAll('.auth-form').forEach((f) => f.classList.remove('active'));
    document.getElementById(tab + 'Form').classList.add('active');
    showError('');
  }

  // إظهار/إخفاء كلمة المرور
  const EYE = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>';
  const EYE_OFF = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
  function togglePw(id, btn) {
    const inp = document.getElementById(id);
    const show = inp.type === 'password';
    inp.type = show ? 'text' : 'password';
    btn.innerHTML = show ? EYE_OFF : EYE;
  }

  let pendingEmail = '';
  function showVerify(email, devCode) {
    pendingEmail = email;
    document.getElementById('authTabs').style.display = 'none';
    document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
    document.getElementById('verifyForm').classList.add('active');
    document.getElementById('verifyEmailLabel').textContent = email;
    const dn = document.getElementById('devCodeNote');
    if (devCode) { dn.style.display = 'block'; dn.innerHTML = `وضع التطوير (البريد غير مفعّل): رمزك هو <b style="font-size:1.1rem;letter-spacing:.2rem;">${devCode}</b>`; document.getElementById('verifyCode').value = devCode; }
    else { dn.style.display = 'none'; }
    showError('');
    document.getElementById('verifyCode').focus();
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.toggle('visible', !!msg);
  }

  function setLoading(btnId, spinnerId, loading) {
    const btn = document.getElementById(btnId);
    const spinner = document.getElementById(spinnerId);
    btn.disabled = loading;
    btn.querySelector('.btn-text').style.display = loading ? 'none' : '';
    spinner.classList.toggle('visible', loading);
  }

  async function handleLogin(e) {
    e.preventDefault();
    showError('');
    setLoading('loginBtn', 'loginSpinner', true);
    try {
      const data = await api.login(
        document.getElementById('loginEmail').value,
        document.getElementById('loginPassword').value
      );
      window.location.href = data.user.is_admin ? 'admin.html' : '../index.html';
    } catch (err) {
      showError(err.message);
      setLoading('loginBtn', 'loginSpinner', false);
    }
  }

  async function handleRegister(e) {
    e.preventDefault();
    showError('');
    setLoading('registerBtn', 'registerSpinner', true);
    try {
      const r = await api.registerInit(
        document.getElementById('regName').value,
        document.getElementById('regEmail').value,
        document.getElementById('regPassword').value,
        document.getElementById('regPhone').value
      );
      showVerify(r.email || document.getElementById('regEmail').value, r.devCode);
    } catch (err) {
      showError(err.message);
    } finally {
      setLoading('registerBtn', 'registerSpinner', false);
    }
  }

  async function handleVerify(e) {
    e.preventDefault();
    showError('');
    setLoading('verifyBtn', 'verifySpinner', true);
    try {
      const data = await api.verifyEmail(pendingEmail, document.getElementById('verifyCode').value.trim());
      window.location.href = data.user.is_admin ? 'admin.html' : '../index.html';
    } catch (err) {
      showError(err.message);
      setLoading('verifyBtn', 'verifySpinner', false);
    }
  }

  async function resendCode() {
    showError('');
    try {
      const r = await api.resendCode(pendingEmail, 'verify');
      if (r.devCode) { document.getElementById('verifyCode').value = r.devCode; showError(''); }
      const dn = document.getElementById('devCodeNote');
      dn.style.display = 'block';
      dn.innerHTML = r.devCode ? `تم الإرسال (وضع التطوير): رمزك <b>${r.devCode}</b>` : 'تم إرسال رمز جديد إلى بريدك.';
    } catch (err) { showError(err.message); }
  }

  // Theme toggle
  document.addEventListener('DOMContentLoaded', () => {
    const btn = document.getElementById('themeToggle');
    if (btn) btn.addEventListener('click', () => {
      const isLight = document.documentElement.getAttribute('data-theme') === 'light';
      document.documentElement.setAttribute('data-theme', isLight ? 'dark' : 'light');
      localStorage.setItem('tajer-theme', isLight ? 'dark' : 'light');
    });
  });
</script>
<script src="../assets/header.js?v=17"></script>
</body>
</html>
