<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رسائلي — أدوات التاجر</title>
<meta name="description" content="تذاكر الدعم ومحادثاتك مع فريق خبراء المنصات.">
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
<script>(function(){var t=localStorage.getItem('tajer-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/styles.css?v=13">
<link rel="stylesheet" href="../assets/responsive.css?v=1">
<style>
  .ms-page { max-width: 1050px; margin: 0 auto; padding: 2rem 1.2rem 4rem; }
  .ms-head { display: flex; justify-content: space-between; align-items: center; gap: 1rem; margin-bottom: 1.4rem; flex-wrap: wrap; }
  .ms-head h1 { font-size: 1.6rem; margin: 0; }
  .ms-head p { margin: .2rem 0 0; color: var(--ink-dim); font-size: .9rem; }
  .ms-layout { display: grid; grid-template-columns: 360px 1fr; gap: 1.2rem; align-items: stretch; min-height: 60vh; }
  @media (max-width: 820px) { .ms-layout { grid-template-columns: 1fr; } .ms-chat.show ~ .ms-list, .ms-list.hide { display: none; } }

  .ms-panel { background: var(--bg-alt); border: 1px solid var(--line); border-radius: var(--radius-lg); overflow: hidden; display: flex; flex-direction: column; }
  .ms-list { max-height: 72vh; }
  .ms-list-head { padding: 1rem 1.1rem; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; gap: .5rem; }
  .ms-list-head b { font-size: 1rem; }
  .ms-new-btn { background: linear-gradient(135deg, var(--accent-2), var(--accent)); color: #fff; border: none; border-radius: 99px; padding: .45rem .9rem; font-size: .82rem; font-weight: 700; cursor: pointer; font-family: var(--font-arabic); display: inline-flex; align-items: center; gap: .35rem; }
  .ms-items { overflow-y: auto; flex: 1; }
  .ms-item { display: flex; gap: .75rem; padding: .9rem 1.1rem; border-bottom: 1px solid var(--line); cursor: pointer; transition: background .15s; text-align: right; width: 100%; background: none; border-right: none; border-left: none; border-top: none; font-family: inherit; }
  .ms-item:hover { background: var(--bg-card); }
  .ms-item.active { background: var(--accent-soft); }
  .ms-ava { width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0; background: var(--accent-soft); color: var(--accent); display: flex; align-items: center; justify-content: center; }
  .ms-ava svg { width: 22px; height: 22px; }
  .ms-it-body { flex: 1; min-width: 0; }
  .ms-it-top { display: flex; justify-content: space-between; gap: .5rem; align-items: center; }
  .ms-it-title { font-weight: 700; font-size: .9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ms-it-time { font-size: .7rem; color: var(--ink-mid); flex-shrink: 0; }
  .ms-it-last { font-size: .8rem; color: var(--ink-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin: .15rem 0 .3rem; }
  .ms-it-meta { display: flex; align-items: center; gap: .5rem; }
  .ms-it-num { font-size: .68rem; color: var(--accent); font-weight: 700; }
  .ms-st { font-size: .65rem; font-weight: 700; padding: .12rem .5rem; border-radius: 99px; }
  .ms-empty { padding: 3rem 1.5rem; text-align: center; color: var(--ink-dim); font-size: .9rem; }

  /* chat */
  .ms-chat { min-height: 60vh; }
  .ms-chat-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--ink-dim); padding: 3rem 1.5rem; text-align: center; }
  .ms-chat-head { padding: 1rem 1.2rem; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: .7rem; }
  .ms-back { display: none; background: none; border: none; color: var(--ink); cursor: pointer; padding: .2rem; }
  @media (max-width: 820px) { .ms-back { display: inline-flex; } }
  .ms-chat-title { font-weight: 700; font-size: .95rem; }
  .ms-chat-sub { font-size: .75rem; color: var(--ink-dim); }
  .ms-msgs { flex: 1; overflow-y: auto; padding: 1.2rem; display: flex; flex-direction: column; gap: .6rem; max-height: 60vh; min-height: 300px; }
  .ms-bubble { max-width: 80%; padding: .65rem .9rem; border-radius: 14px; font-size: .9rem; line-height: 1.65; white-space: pre-wrap; word-break: break-word; }
  .ms-bubble.admin { align-self: flex-start; background: var(--bg-card); border: 1px solid var(--line); border-bottom-right-radius: 4px; }
  .ms-bubble.user { align-self: flex-end; background: linear-gradient(135deg, var(--accent-2), var(--accent)); color: #fff; border-bottom-left-radius: 4px; }
  .ms-bubble-time { font-size: .62rem; opacity: .65; margin-top: .25rem; }
  .ms-input { display: flex; gap: .5rem; padding: .9rem 1.1rem; border-top: 1px solid var(--line); }
  .ms-input input { flex: 1; background: var(--bg); border: 1px solid var(--line-strong); border-radius: 12px; padding: .65rem .9rem; color: var(--ink); font-family: var(--font-arabic); }
  .ms-input input:focus { outline: none; border-color: var(--accent); }
  .ms-input button { background: var(--accent); color: #fff; border: none; border-radius: 12px; width: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .ms-input button svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2; }
  /* new ticket topics */
  .ms-topics { padding: 1rem 1.1rem; border-bottom: 1px solid var(--line); display: none; }
  .ms-topics.show { display: block; }
  .ms-topics .lbl { font-size: .82rem; color: var(--ink-dim); margin-bottom: .6rem; }
  .ms-chips { display: flex; flex-wrap: wrap; gap: .4rem; }
  .ms-chip { background: var(--bg-card); border: 1px solid var(--accent); color: var(--accent); border-radius: 99px; padding: .35rem .8rem; font-size: .8rem; cursor: pointer; font-family: var(--font-arabic); }
  .ms-chip:hover { background: var(--accent-soft); }
</style>
</head>
<body>

<section class="page-header">
  <div class="container">
    <div class="page-header-content">
      <span class="badge" style="margin-bottom:1.2rem;">الدعم</span>
      <h1>رسائلي <em>وتذاكر الدعم</em></h1>
      <p>محادثاتك مع فريق خبراء المنصات — كل تذكرة برقمها وحالتها.</p>
    </div>
  </div>
</section>

<div class="ms-page">
  <div class="ms-layout">
    <!-- القائمة -->
    <div class="ms-panel ms-list" id="msList">
      <div class="ms-list-head">
        <b>الرسائل</b>
        <button class="ms-new-btn" onclick="toggleNew()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
          تذكرة جديدة
        </button>
      </div>
      <div class="ms-topics" id="msTopics">
        <div class="lbl">اختر موضوع تذكرتك:</div>
        <div class="ms-chips" id="msChips"></div>
      </div>
      <div class="ms-items" id="msItems"><div class="ms-empty">جارٍ التحميل...</div></div>
    </div>

    <!-- المحادثة -->
    <div class="ms-panel ms-chat" id="msChat">
      <div class="ms-chat-empty" id="msChatEmpty">اختر محادثة من القائمة لعرضها</div>
      <div id="msChatView" style="display:none;flex-direction:column;height:100%;">
        <div class="ms-chat-head">
          <button class="ms-back" onclick="closeChat()"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></button>
          <div class="ms-ava"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg></div>
          <div style="flex:1;">
            <div class="ms-chat-title" id="msChatTitle"></div>
            <div class="ms-chat-sub" id="msChatSub"></div>
          </div>
        </div>
        <div class="ms-msgs" id="msMsgs"></div>
        <div id="msAttachBar" style="display:none;gap:.4rem;flex-wrap:wrap;padding:.4rem .6rem 0;"></div>
        <div class="ms-input">
          <button onclick="document.getElementById('msFile').click()" title="إرفاق صورة أو ملف" style="background:var(--bg-card);border:1px solid var(--line-strong);color:var(--ink-dim);"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg></button>
          <input type="file" id="msFile" accept="image/*,.pdf,.txt,.doc,.docx,.xls,.xlsx,.csv" multiple style="display:none;">
          <input type="text" id="msInput" placeholder="اكتب رسالتك..." onkeydown="if(event.key==='Enter')msSend()">
          <button onclick="msSend()"><svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../assets/api.js?v=44"></script>
<script>
const TOPICS = ['طلب خدمة', 'استفسار عن أداة', 'مشكلة تقنية', 'الفواتير والاشتراك', 'اقتراح', 'أخرى'];
const ST = {
  open:     { l: 'بانتظار رد الفريق', c: '#f59e0b' },
  answered: { l: 'ردّ الفريق — اطّلع', c: '#22c55e' },
  closed:   { l: 'مغلقة', c: 'var(--ink-dim)' },
};
const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
function timeAgo(d) {
  const mins = Math.round((Date.now() - new Date(d)) / 60000);
  if (mins < 1) return 'الآن'; if (mins < 60) return `قبل ${mins} د`;
  const h = Math.round(mins / 60); if (h < 24) return `قبل ${h} س`;
  return `قبل ${Math.round(h / 24)} يوم`;
}

let _list = [], _cur = null, _lastId = 0, _poll = null;

if (!auth.isLoggedIn()) {
  location.href = 'login.html';
}

async function loadList() {
  try { _list = await api.tickets.mine(); } catch { _list = []; }
  const el = document.getElementById('msItems');
  if (!_list.length) { el.innerHTML = '<div class="ms-empty">لا توجد رسائل بعد.<br>افتح تذكرة جديدة للتواصل مع فريق الدعم.</div>'; return; }
  el.innerHTML = _list.map(t => {
    const st = ST[t.status] || ST.open;
    return `<button class="ms-item ${_cur && _cur.id === t.id ? 'active' : ''}" onclick="openChat(${t.id})">
      <div class="ms-ava"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg></div>
      <div class="ms-it-body">
        <div class="ms-it-top"><span class="ms-it-title">${esc(t.topic)}</span><span class="ms-it-time">${timeAgo(t.updated_at)}</span></div>
        <div class="ms-it-last">${esc(t.last_message || 'لا رسائل بعد')}</div>
        <div class="ms-it-meta"><span class="ms-it-num">#${esc(t.number)}</span><span class="ms-st" style="color:${st.c};background:${st.c}22;">${st.l}</span></div>
      </div>
    </button>`;
  }).join('');
}

async function openChat(id) {
  _cur = _list.find(t => t.id === id) || { id };
  _lastId = 0;
  loadList();
  document.getElementById('msChatEmpty').style.display = 'none';
  document.getElementById('msChatView').style.display = 'flex';
  document.getElementById('msList').classList.add('hide');
  document.getElementById('msChat').classList.add('show');
  document.getElementById('msChatTitle').textContent = `${_cur.topic || 'تذكرة'}`;
  document.getElementById('msChatSub').textContent = `#${_cur.number || ''}`;
  document.getElementById('msMsgs').innerHTML = '';
  _msAtt = []; renderAttBar(); bindMsFile();
  await pull(true);
  startPoll();
  document.getElementById('msInput').focus();
}

function closeChat() {
  stopPoll(); _cur = null;
  document.getElementById('msList').classList.remove('hide');
  document.getElementById('msChat').classList.remove('show');
  document.getElementById('msChatView').style.display = 'none';
  document.getElementById('msChatEmpty').style.display = 'flex';
  loadList();
}

function startPoll() { stopPoll(); _poll = setInterval(() => pull(false), 8000); }
function stopPoll() { if (_poll) { clearInterval(_poll); _poll = null; } }

// عرض المرفقات داخل الفقاعة (صور كمعاينة + ملفات كروابط تحميل)
function attHtml(att) {
  if (!att || !att.length) return '';
  return '<div style="display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.4rem;">' + att.map(a => {
    if ((a.type || '').startsWith('image/') || /^data:image\//.test(a.url))
      return `<a href="${a.url}" download="${esc(a.name)}" target="_blank"><img src="${a.url}" style="max-width:140px;max-height:140px;border-radius:8px;border:1px solid rgba(255,255,255,.25);"></a>`;
    return `<a href="${a.url}" download="${esc(a.name)}" style="display:inline-flex;align-items:center;gap:.3rem;background:rgba(255,255,255,.15);border-radius:8px;padding:.35rem .6rem;font-size:.78rem;color:inherit;text-decoration:none;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg> ${esc(a.name)}</a>`;
  }).join('') + '</div>';
}
async function pull(scroll) {
  if (!_cur) return;
  let d; try { d = await api.tickets.messages(_cur.id, _lastId); } catch { return; }
  const box = document.getElementById('msMsgs');
  let added = false;
  (d.messages || []).forEach(m => {
    _lastId = Math.max(_lastId, m.id);
    const b = document.createElement('div');
    b.className = 'ms-bubble ' + (m.sender === 'admin' ? 'admin' : 'user');
    b.innerHTML = `${esc(m.body)}${attHtml(m.attachments)}<div class="ms-bubble-time">${timeAgo(m.created_at)}</div>`;
    box.appendChild(b); added = true;
  });
  if (scroll || added) box.scrollTop = box.scrollHeight;
}

let _msAtt = [];
function renderAttBar() {
  const bar = document.getElementById('msAttachBar');
  bar.style.display = _msAtt.length ? 'flex' : 'none';
  bar.innerHTML = _msAtt.map((a, i) => `<span style="display:inline-flex;align-items:center;gap:.3rem;background:var(--accent-soft);color:var(--accent);border-radius:8px;padding:.25rem .6rem;font-size:.75rem;">${esc(a.name)} <span style="cursor:pointer;font-weight:700;" onclick="_msAtt.splice(${i},1);renderAttBar()">×</span></span>`).join('');
}
function bindMsFile() {
  const f = document.getElementById('msFile'); if (!f || f._bound) return; f._bound = true;
  f.addEventListener('change', ev => {
    [...ev.target.files].slice(0, 5).forEach(file => {
      if (file.size > 5 * 1024 * 1024) { showError ? showError('حجم كبير', file.name + ' أكبر من 5MB') : alert('ملف كبير'); return; }
      const r = new FileReader();
      r.onload = e2 => { _msAtt.push({ name: file.name, type: file.type, url: e2.target.result }); renderAttBar(); };
      r.readAsDataURL(file);
    });
    ev.target.value = '';
  });
}

async function msSend() {
  const inp = document.getElementById('msInput');
  const body = inp.value.trim();
  if ((!body && !_msAtt.length) || !_cur) return;
  const att = _msAtt.slice(); _msAtt = []; renderAttBar();
  inp.value = '';
  const box = document.getElementById('msMsgs');
  const b = document.createElement('div');
  b.className = 'ms-bubble user';
  b.innerHTML = `${esc(body || '(مرفق)')}${attHtml(att)}<div class="ms-bubble-time">الآن</div>`;
  box.appendChild(b); box.scrollTop = box.scrollHeight;
  try { const m = await api.tickets.send(_cur.id, body, att); _lastId = Math.max(_lastId, m.id); }
  catch { b.style.opacity = .5; }
}

function toggleNew() {
  const t = document.getElementById('msTopics');
  t.classList.toggle('show');
  if (t.classList.contains('show')) {
    document.getElementById('msChips').innerHTML = TOPICS.map(x =>
      `<button class="ms-chip" onclick="newTicket('${x.replace(/'/g, '')}')">${x}</button>`).join('');
  }
}

async function newTicket(topic) {
  if (topic === 'أخرى') {
    const custom = prompt('اكتب موضوع تذكرتك:');
    if (!custom || !custom.trim()) return;
    topic = custom.trim().slice(0, 100);
  }
  try {
    const t = await api.tickets.create({ topic });
    document.getElementById('msTopics').classList.remove('show');
    await loadList();
    openChat(t.id);
  } catch (e) { alert('تعذّر فتح التذكرة، حاول مرة أخرى.'); }
}

// فتح تذكرة محددة عبر الرابط ?t=ID (من الودجت)
(async function init() {
  await loadList();
  const tid = parseInt(new URLSearchParams(location.search).get('t'));
  if (tid) openChat(tid);
})();
</script>
<script src="../assets/header.js?v=17"></script>
</body>
</html>
