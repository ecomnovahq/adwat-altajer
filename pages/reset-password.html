<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إعادة تعيين كلمة المرور — أدوات التاجر</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
<script>(function(){var t=localStorage.getItem('tajer-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/styles.css">
<style>
  .auth-page { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; }
  .auth-card { width:100%; max-width:420px; background:var(--bg-alt); border:1px solid var(--line-strong); border-radius:var(--radius-lg); padding:2.5rem; position:relative; overflow:hidden; }
  .auth-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--accent-2),var(--accent),var(--accent-3)); }
  .auth-logo { text-align:center; margin-bottom:2rem; }
  .auth-logo svg { width:36px; height:50px; }
  .auth-title { font-size:1.4rem; font-weight:700; text-align:center; margin-bottom:0.5rem; }
  .auth-subtitle { color:var(--ink-dim); text-align:center; font-size:0.9rem; margin-bottom:2rem; }
  .form-group { margin-bottom:1.2rem; }
  label { display:block; font-size:0.83rem; color:var(--ink-dim); margin-bottom:0.4rem; }
  .auth-submit { width:100%; padding:0.85rem; font-size:1rem; margin-top:0.5rem; }
  .auth-footer { text-align:center; margin-top:1.5rem; font-size:0.87rem; color:var(--ink-dim); }
  .auth-footer a { color:var(--accent); text-decoration:none; font-weight:600; }
  .msg-box { padding:0.85rem 1rem; border-radius:var(--radius-md); font-size:0.88rem; margin-bottom:1rem; display:none; }
  .msg-box.success { background:rgba(34,197,94,0.12); color:#22c55e; border:1px solid rgba(34,197,94,0.25); }
  .msg-box.error   { background:rgba(239,68,68,0.12); color:#ef4444; border:1px solid rgba(239,68,68,0.25); }
</style>
</head>
<body>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <a href="../index.html">
        <svg viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg">
          <polygon points="50,4 93,30 93,110 50,136 7,110 7,30" fill="#a855f7"/>
          <polygon class="logo-bg" points="7,30 50,4 50,70 7,70"/>
          <polygon class="logo-bg" points="50,70 93,70 93,110 50,136"/>
        </svg>
      </a>
    </div>

    <h1 class="auth-title">إعادة تعيين كلمة المرور</h1>
    <p class="auth-subtitle">أدخل كلمة مرور جديدة لحسابك.</p>

    <div class="msg-box" id="msgBox"></div>

    <form id="resetForm" onsubmit="handleSubmit(event)">
      <div class="form-group">
        <label for="password">كلمة المرور الجديدة</label>
        <input type="password" id="password" class="input" placeholder="8 أحرف على الأقل" required minlength="8" style="width:100%">
      </div>
      <div class="form-group">
        <label for="confirm">تأكيد كلمة المرور</label>
        <input type="password" id="confirm" class="input" placeholder="أعد كتابة كلمة المرور" required style="width:100%">
      </div>
      <button type="submit" class="btn-primary auth-submit" id="submitBtn">حفظ كلمة المرور</button>
    </form>

    <div class="auth-footer">
      <a href="login.html">← العودة لتسجيل الدخول</a>
    </div>
  </div>
</div>

<script>
const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:3001/api' : '/api';
const token = new URLSearchParams(window.location.search).get('token');

if (!token) {
  document.getElementById('msgBox').className = 'msg-box error';
  document.getElementById('msgBox').textContent = 'رابط غير صالح. يرجى طلب رابط جديد.';
  document.getElementById('msgBox').style.display = 'block';
  document.getElementById('resetForm').style.display = 'none';
}

async function handleSubmit(e) {
  e.preventDefault();
  const password = document.getElementById('password').value;
  const confirm  = document.getElementById('confirm').value;
  const msgBox   = document.getElementById('msgBox');
  const btn      = document.getElementById('submitBtn');

  if (password !== confirm) {
    msgBox.className = 'msg-box error';
    msgBox.textContent = 'كلمتا المرور غير متطابقتين';
    msgBox.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'جاري الحفظ...';

  try {
    const res = await fetch(API_BASE + '/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password }),
    });
    const data = await res.json();
    msgBox.className = 'msg-box ' + (res.ok ? 'success' : 'error');
    msgBox.textContent = data.message || data.error;
    msgBox.style.display = 'block';
    if (res.ok) {
      document.getElementById('resetForm').style.display = 'none';
      setTimeout(() => window.location.href = 'login.html', 2500);
    }
  } catch {
    msgBox.className = 'msg-box error';
    msgBox.textContent = 'تعذّر الاتصال بالخادم.';
    msgBox.style.display = 'block';
  }

  btn.disabled = false;
  btn.textContent = 'حفظ كلمة المرور';
}
</script>
</body>
</html>
