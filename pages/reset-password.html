<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إعادة تعيين كلمة المرور — أدوات التاجر</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
<script>(function(){var t=localStorage.getItem('tajer-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/styles.css?v=13">
<link rel="stylesheet" href="../assets/responsive.css?v=1">
<style>
  .auth-page { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; }
  .auth-card { width:100%; max-width:420px; background:var(--bg-alt); border:1px solid var(--line-strong); border-radius:var(--radius-lg); padding:2.5rem; position:relative; overflow:hidden; }
  .auth-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--accent-2),var(--accent),var(--accent-3)); }
  .auth-logo { text-align:center; margin-bottom:2rem; }
  .auth-logo svg { width:36px; height:50px; }
  .auth-title { font-size:1.4rem; font-weight:700; text-align:center; margin-bottom:0.5rem; }
  .auth-subtitle { color:var(--ink-dim); text-align:center; font-size:0.9rem; margin-bottom:2rem; }
  .form-group { margin-bottom:1.2rem; }
  label { display:block; font-size:0.83rem; color:var(--ink-dim); margin-bottom:0.4rem; }
  .auth-submit { width:100%; padding:0.85rem; font-size:1rem; margin-top:0.5rem; }
  .auth-footer { text-align:center; margin-top:1.5rem; font-size:0.87rem; color:var(--ink-dim); }
  .auth-footer a { color:var(--accent); text-decoration:none; font-weight:600; }
  .msg-box { padding:0.85rem 1rem; border-radius:var(--radius-md); font-size:0.88rem; margin-bottom:1rem; display:none; }
  .msg-box.success { background:rgba(34,197,94,0.12); color:#22c55e; border:1px solid rgba(34,197,94,0.25); }
  .msg-box.error   { background:rgba(239,68,68,0.12); color:#ef4444; border:1px solid rgba(239,68,68,0.25); }
  .pw-wrap { position:relative; }
  .pw-wrap .input { padding-left:2.8rem; width:100%; }
  .pw-eye { position:absolute; left:.6rem; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--ink-dim); padding:.3rem; display:flex; }
  .pw-eye svg { width:18px; height:18px; }
  .code-input { width:100%; text-align:center; letter-spacing:.8rem; font-size:1.5rem; font-weight:800; font-family:monospace; padding:.7rem; }
</style>
</head>
<body>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <a href="../index.html">
        <svg viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg">
          <polygon points="50,4 93,30 93,110 50,136 7,110 7,30" fill="#a855f7"/>
          <polygon class="logo-bg" points="7,30 50,4 50,70 7,70"/>
          <polygon class="logo-bg" points="50,70 93,70 93,110 50,136"/>
        </svg>
      </a>
    </div>

    <h1 class="auth-title">إعادة تعيين كلمة المرور</h1>
    <p class="auth-subtitle">أدخل الرمز المُرسَل إلى بريدك وكلمة المرور الجديدة.</p>

    <div class="msg-box" id="msgBox"></div>

    <form id="resetForm" onsubmit="handleSubmit(event)">
      <div class="form-group">
        <label for="email">البريد الإلكتروني</label>
        <input type="email" id="email" class="input" placeholder="you@example.com" required style="width:100%">
      </div>
      <div class="form-group">
        <label for="code">رمز التحقق (6 أرقام)</label>
        <input type="text" id="code" class="input code-input" placeholder="······" required inputmode="numeric" maxlength="6" autocomplete="one-time-code">
      </div>
      <div class="form-group">
        <label for="password">كلمة المرور الجديدة</label>
        <div class="pw-wrap">
          <input type="password" id="password" class="input" placeholder="8 أحرف على الأقل" required minlength="8">
          <button type="button" class="pw-eye" onclick="togglePw('password',this)" aria-label="إظهار"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
      </div>
      <div class="form-group">
        <label for="confirm">تأكيد كلمة المرور</label>
        <div class="pw-wrap">
          <input type="password" id="confirm" class="input" placeholder="أعد كتابة كلمة المرور" required>
          <button type="button" class="pw-eye" onclick="togglePw('confirm',this)" aria-label="إظهار"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
      </div>
      <button type="submit" class="btn-primary auth-submit" id="submitBtn">حفظ كلمة المرور</button>
    </form>

    <div class="auth-footer">
      <a href="login.html">← العودة لتسجيل الدخول</a>
    </div>
  </div>
</div>

<script src="../assets/api.js?v=47"></script>
<script>
const _qs = new URLSearchParams(location.search);
const _email = _qs.get('email'); const _dev = _qs.get('dev');
if (_email) document.getElementById('email').value = _email;
if (_dev) { document.getElementById('code').value = _dev;
  const m = document.getElementById('msgBox'); m.className='msg-box success'; m.style.display='block';
  m.innerHTML = `وضع التطوير (البريد غير مفعّل): رمزك <b>${_dev}</b>`; }

function togglePw(id, btn) {
  const inp = document.getElementById(id);
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.querySelector('svg').style.opacity = show ? .5 : 1;
}

async function handleSubmit(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const code = document.getElementById('code').value.trim();
  const password = document.getElementById('password').value;
  const confirm  = document.getElementById('confirm').value;
  const msgBox   = document.getElementById('msgBox');
  const btn      = document.getElementById('submitBtn');

  if (password !== confirm) {
    msgBox.className = 'msg-box error'; msgBox.textContent = 'كلمتا المرور غير متطابقتين'; msgBox.style.display = 'block'; return;
  }
  btn.disabled = true; btn.textContent = 'جاري الحفظ...';
  try {
    const data = await api.resetPassword(email, code, password);
    msgBox.className = 'msg-box success';
    msgBox.textContent = data.message || 'تم بنجاح';
    msgBox.style.display = 'block';
    document.getElementById('resetForm').style.display = 'none';
    setTimeout(() => location.href = 'login.html', 2200);
  } catch (err) {
    msgBox.className = 'msg-box error'; msgBox.textContent = err.message || 'حدث خطأ'; msgBox.style.display = 'block';
    btn.disabled = false; btn.textContent = 'حفظ كلمة المرور';
  }
}
</script>
<script src="../assets/header.js?v=20"></script>
</body>
</html>
